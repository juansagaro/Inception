# =====================================================
# Main server block: WordPress (jsagaro-.42.fr)
# =====================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name jsagaro-.42.fr;

    # SSL certs
    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # WordPress root
    root /var/www/html;
    index index.php index.html index.htm;

    # Handle WordPress permalinks
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Pass PHP to WordPress container
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}

# =====================================================
# Server block: Adminer (adminer.jsagaro-.42.fr)
# =====================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name adminer.jsagaro-.42.fr;

    # Same cert (SAN covers subdomains)
    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Reverse proxy to Adminer container
    location / {
        proxy_pass http://adminer:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =====================================================
# Server block: Static Site (static.jsagaro-.42.fr)
# =====================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name static.jsagaro-.42.fr;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Reverse proxy to static container
    location / {
        proxy_pass http://static:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =====================================================
# Server block: Portainer (portainer.jsagaro-.42.fr)
# =====================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name portainer.jsagaro-.42.fr;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Reverse proxy to Portainer
    location / {
        proxy_pass http://portainer:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Portainer UI
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
