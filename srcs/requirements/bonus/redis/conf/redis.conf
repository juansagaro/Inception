# Redis configuration for WordPress cache

# Escuchar en todas las interfaces (necesario para Docker networking)
bind 0.0.0.0

# Desactivar protected-mode para permitir conexiones desde otros contenedores
# Seguro porque Redis solo es accesible dentro de la red Docker interna
protected-mode no

# Puerto estándar de Redis
port 6379

# Ejecutar en primer plano (no como daemon) - VITAL para Docker
daemonize no

# Política de memoria: eliminar las claves menos usadas cuando se llene
maxmemory 128mb
maxmemory-policy allkeys-lru

# Persistencia desactivada (es solo cache, no necesitamos guardar en disco)
save ""
appendonly no

# Logging
loglevel notice

# Timeout de conexiones inactivas (0 = sin timeout)
timeout 0

# TCP keepalive
tcp-keepalive 300
