# Redis configuration for WordPress cache

# Listen on all interfaces (required for Docker networking)
bind 0.0.0.0

# Disable protected-mode for container-to-container connections
# Safe because Redis is only accessible within Docker internal network
protected-mode no

# Default Redis port
port 6379

# Run in foreground (not as daemon) - required for Docker
daemonize no

# Eviction policy: remove least recently used keys when memory is full
maxmemory 128mb
maxmemory-policy allkeys-lru

# Disable persistence (cache only, no need to save to disk)
save ""
appendonly no

# Logging
loglevel notice

# Idle connection timeout (0 = no timeout)
timeout 0

# TCP keepalive
tcp-keepalive 300
