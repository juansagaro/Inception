# vsftpd configuration for Inception bonus
# Configurado para funcionar en Docker con modo pasivo

# Ejecutar en primer plano (NO como daemon) - VITAL para Docker
background=NO

# Escuchar en IPv4
listen=YES
listen_ipv6=NO

# Deshabilitar usuarios anónimos
anonymous_enable=NO

# Permitir usuarios locales
local_enable=YES

# Permitir escritura
write_enable=YES

# Máscara de permisos (022 = archivos con 644, directorios con 755)
local_umask=022

# Mostrar mensajes del directorio
dirmessage_enable=YES

# Usar hora local
use_localtime=YES

# Log de transferencias
xferlog_enable=YES
xferlog_std_format=YES

# Puerto de conexión
connect_from_port_20=YES

# Encerrar usuarios en su directorio home (chroot jail)
chroot_local_user=YES
allow_writeable_chroot=YES

# Directorio raíz para el usuario FTP
local_root=/var/www/html

# Configuración de modo pasivo (CRÍTICO para Docker)
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110
pasv_address=127.0.0.1

# Seguridad
seccomp_sandbox=NO
