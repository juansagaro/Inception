# vsftpd configuration for Inception bonus
# Configured for Docker with passive mode

# Run in foreground (NOT as daemon) - required for Docker
background=NO

# Listen on IPv4
listen=YES
listen_ipv6=NO

# Disable anonymous users
anonymous_enable=NO

# Allow local users
local_enable=YES

# Allow write operations
write_enable=YES

# Permission mask (022 = files 644, directories 755)
local_umask=022

# Show directory messages
dirmessage_enable=YES

# Use local time
use_localtime=YES

# Transfer logging
xferlog_enable=YES
xferlog_std_format=YES

# Connect from port 20
connect_from_port_20=YES

# Chroot users to their home directory (chroot jail)
chroot_local_user=YES
allow_writeable_chroot=YES

# Root directory for FTP user
local_root=/var/www/html

# Passive mode config (critical for Docker)
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110
pasv_address=127.0.0.1

# Security
seccomp_sandbox=NO
