services:
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    image: nginx_image
    restart: always
    ports:
      - "443:443"
    depends_on:
      - wordpress
    networks:
      - jsagaro-net
    volumes:
      - wordpress_data:/var/www/html

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    image: mariadb_image
    restart: always
    env_file: .env
    networks:
      - jsagaro-net
    volumes:
      - mariadb_data:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    image: wordpress_image
    restart: always
    env_file: .env
    depends_on:
      - mariadb
    networks:
      - jsagaro-net
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - db_password
      - wp_admin_password

networks:
  jsagaro-net:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      device: /home/${USER}/data/mariadb
      o: bind
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      device: /home/${USER}/data/wordpress
      o: bind

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
